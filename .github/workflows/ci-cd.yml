name: CI/CD

on:
  push:
    branches: [main]

env:
  ACR_NAME: acrentregable4202606
  IMAGE_NAME: flask-entregable4
  ACI_NAME: aci-entregable4
  RESOURCE_GROUP: rg-entregable4-github
  LOCATION: westeurope
  CONTAINER_PORT: "5000"
  DNS_LABEL: flask-entregable4

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps and run tests
        run: |
          pip install -r requirements.txt
          pytest -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login -n ${{ env.ACR_NAME }}

      - name: Build and push
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.run_number }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to ACI
        run: |
          set -e
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.run_number }}"

          echo "Deleting previous container (if exists)..."
          az container delete -g "${{ env.RESOURCE_GROUP }}" -n "${{ env.ACI_NAME }}" --yes 2>/dev/null || true
          az container wait --deleted -g "${{ env.RESOURCE_GROUP }}" -n "${{ env.ACI_NAME }}" 2>/dev/null || true

          echo "Creating container..."
          az container create \
            -g "${{ env.RESOURCE_GROUP }}" \
            -n "${{ env.ACI_NAME }}" \
            --os-type Linux \
            --image "$IMAGE" \
            --cpu 1 \
            --memory 1.5 \
            --registry-login-server "${{ env.ACR_NAME }}.azurecr.io" \
            --registry-username "$(az acr credential show -n "${{ env.ACR_NAME }}" --query username -o tsv)" \
            --registry-password "$(az acr credential show -n "${{ env.ACR_NAME }}" --query passwords[0].value -o tsv)" \
            --dns-name-label "${{ env.DNS_LABEL }}" \
            --ports "${{ env.CONTAINER_PORT }}" \
            --location "${{ env.LOCATION }}"

          echo "Getting URL..."
          FQDN=$(az container show -g "${{ env.RESOURCE_GROUP }}" -n "${{ env.ACI_NAME }}" --query ipAddress.fqdn -o tsv)
          echo "http://$FQDN:${{ env.CONTAINER_PORT }}"

      - name: Update repository website URL
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          FQDN=$(az container show -g "${{ env.RESOURCE_GROUP }}" -n "${{ env.ACI_NAME }}" --query ipAddress.fqdn -o tsv)
          gh repo edit "${{ github.repository }}" --homepage "http://$FQDN:${{ env.CONTAINER_PORT }}"
